services:
  - type: web
    name: sumire-mia-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sumire-mia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: APP_NAME
        value: すみれ＆みあ
      - key: SENDGRID_API_KEY
        sync: false  # You'll need to set this manually
      - key: SENDGRID_FROM_EMAIL
        value: sumirepohscarlet@gmail.com
      - key: SENDGRID_FROM_NAME
        value: すみれ＆みあ
      - key: APP_URL
        value: https://sumire-mia-app.onrender.com

databases:
  - name: sumire-mia-db
    databaseName: sumiremiadb
    user: sumiremiadb_user
    plan: free
