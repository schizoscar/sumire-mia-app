{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card fade-in">
            <div class="card-header text-center">
                <h4 class="mb-0">
                    <i class="bi bi-cup-straw me-2"></i> join us
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person me-2"></i>username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="choose a username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope me-2"></i>email
                        </label>
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="your@email.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-2"></i>password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="create a password" required>
                    </div>
                    
                    <div class="mb-3">  <!-- Changed from mb-4 to mb-3 -->
                        <label for="color_scheme" class="form-label">
                            <i class="bi bi-palette me-2"></i>theme color
                        </label>
                        <select class="form-control" id="color_scheme" name="color_scheme" required>
                            <option value="purple" style="background: #e6e6fa; color: #4a4a4a;">💜 lavender</option>
                            <option value="pink" style="background: #ffdab9; color: #4a4a4a;">🩷 peach</option>
                            <option value="blue" style="background: #b8e2f2; color: #4a4a4a;">💙 sky blue</option>
                            <option value="orange" style="background: #ffd7b5; color: #4a4a4a;">🧡 coral</option>
                        </select>
                        <small class="form-text user-hint">choose a color to represent you</small>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-person-plus me-2"></i> create account
                        </button>
                    </div>
                </form>
                
                <hr class="my-4" style="border-color: var(--pastel-lavender);">
                
                <p class="text-center mb-0">
                    <span style="color: var(--warm-gray);">already have an account?</span>
                    <a href="{{ url_for('auth.login') }}" style="color: var(--charcoal); font-weight: 500; text-decoration: none; border-bottom: 2px solid var(--pastel-lavender);">
                        sign in
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
.user-hint {
    color: var(--warm-gray) !important;
    font-size: 0.8rem;
    margin-top: 5px;
    display: block;
}

select.form-control option {
    padding: 10px;
}
</style>
{% endblock %}
