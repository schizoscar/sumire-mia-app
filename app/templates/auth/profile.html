{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card fade-in">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="bi bi-person me-2"></i> your profile
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.profile') }}">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-person me-2"></i>username
                        </label>
                        <input type="text" class="form-control" value="{{ current_user.username }}" readonly disabled>
                        <small class="form-text user-hint">username cannot be changed</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope me-2"></i>email
                        </label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ current_user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="color_scheme" class="form-label">
                            <i class="bi bi-palette me-2"></i>theme color
                        </label>
                        <select class="form-control" id="color_scheme" name="color_scheme">
                            <option value="purple" {% if current_user.color_scheme == 'purple' %}selected{% endif %}>💜 lavender</option>
                            <option value="pink" {% if current_user.color_scheme == 'pink' %}selected{% endif %}>🩷 peach</option>
                        </select>
                    </div>
                    
                    <hr class="my-4" style="border-color: var(--pastel-lavender);">
                    
                    <h5 class="mb-3" style="font-size: 1.1rem;">
                        <i class="bi bi-key me-2"></i>change password
                    </h5>
                    <p class="user-hint" style="margin-top: -5px; margin-bottom: 15px;">leave blank to keep current</p>
                    
                    <div class="mb-3">
                        <label for="new_password" class="form-label">new password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" 
                               placeholder="enter new password">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-check-circle me-2"></i> save changes
                        </button>
                        <a href="{{ url_for('main.index') }}" class="btn btn-secondary flex-grow-1">
                            <i class="bi bi-x-circle me-2"></i> cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.user-hint {
    color: var(--warm-gray) !important;
    font-size: 0.85rem;
    margin-top: 5px;
    display: block;
}

input:read-only,
input:disabled {
    background-color: rgba(230, 230, 250, 0.3);
    cursor: not-allowed;
}

.btn-secondary {
    background: white;
    border: 1px solid var(--pastel-lavender);
    color: var(--charcoal);
}

.btn-secondary:hover {
    background: var(--pastel-lavender);
    border-color: var(--soft-lavender);
}
</style>
{% endblock %}
