{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <!-- Mobile-friendly header with proper stacking -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
            <h1 class="mb-0" style="font-size: 1.8rem;">
                <span class="header-chevron">></span> calendar
            </h1>
            <a href="{{ url_for('calendar.add') }}" class="btn btn-primary w-100 w-md-auto">
                <i class="fas fa-plus"></i> new event
            </a>
        </div>
        
        <div class="calendar-wrapper">
            <div class="calendar-container">
                <div class="card">
                    <div class="card-body">
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FullCalendar CSS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />

<!-- FullCalendar JS -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>

<!-- FullCalendar CSS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />

<!-- FullCalendar JS -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');

        // Set color based on user preference
        var eventColor = '{{ "#e6e6fa" if current_user.color_scheme == "purple" else "#ffdab9" }}';

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            themeSystem: 'standard',
            events: {
                url: '/calendar/api/events',
                failure: function (error) {
                    console.error('Error loading events:', error);
                    alert('Failed to load events. Please refresh the page.');
                },
                success: function (data) {
                    console.log('Events loaded:', data);
                }
            },
            eventColor: eventColor,
            eventTextColor: '#4a4a4a',
            // Responsive height settings
            height: window.innerWidth <= 768 ? 'auto' : 'auto',
            contentHeight: window.innerWidth <= 768 ? 'auto' : 'auto',
            aspectRatio: window.innerWidth <= 768 ? 1.5 : 1.5,
            expandRows: true,
            dayMaxEvents: window.innerWidth <= 768 ? 2 : false,
            dayMaxEventRows: window.innerWidth <= 768 ? 2 : false,

            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',

            // Handle event click
            eventClick: function (info) {
                showEventDialog(info.event);
            },

            // Add event display callback
            eventDidMount: function (info) {
                if (info.event.extendedProps.event_type === 'joined') {
                    info.el.setAttribute('data-type', 'joined');
                } else {
                    info.el.setAttribute('data-type', 'solo');
                    const color = info.event.extendedProps.color_scheme || '{{ current_user.color_scheme }}';
                    info.el.setAttribute('data-color', color);
                }

                // Use can_edit instead of is_owner
                if (!info.event.extendedProps.can_edit) {
                    info.el.classList.add('other-user-event');
                    info.el.setAttribute('title', `Created by: ${info.event.extendedProps.owner_username}`);
                }

                info.el.classList.remove('fc-h-event', 'fc-v-event', 'fc-daygrid-event');
                console.log('Event mounted:', info.event.title, 'Owner:', info.event.extendedProps.owner_username, 'Can edit:', info.event.extendedProps.can_edit);
            },

            buttonText: {
                today: 'today',
                month: 'month',
                week: 'week',
                day: 'day'
            }
        });

        calendar.render();
        console.log('Calendar rendered');

        // Add window resize handler for responsive width
        function handleCalendarResize() {
            if (calendar) {
                calendar.updateSize();
            }
        }

        // Run on initial load
        handleCalendarResize();

        // Run on window resize with debounce
        let resizeTimer;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
                handleCalendarResize();
            }, 250);
        });

        // Run on orientation change
        window.addEventListener('orientationchange', function () {
            setTimeout(handleCalendarResize, 100);
        });
    });

    // Custom event dialog function
    function showEventDialog(event) {
        // Use can_edit instead of is_owner
        const canEdit = event.extendedProps.can_edit;
        const ownerUsername = event.extendedProps.owner_username || 'Unknown';
        const joinedUsername = event.extendedProps.joined_username || 'another user';

        const modalHtml = `
            <div class="modal fade" id="eventModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content" style="border-radius: 24px; background: white;">
                        <div class="modal-header" style="border-bottom: 2px solid var(--pastel-lavender);">
                            <h5 class="modal-title" style="color: var(--charcoal);">${event.title}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body" style="padding: 20px;">
                            ${event.extendedProps.description ? `<p style="color: var(--warm-gray); margin-bottom: 15px;">${event.extendedProps.description}</p>` : ''}
                            <p style="color: var(--charcoal); margin-bottom: 5px;">
                                <i class="bi bi-person me-2" style="color: var(--pastel-lavender);"></i>
                                Created by: ${ownerUsername}
                            </p>
                            <p style="color: var(--charcoal); margin-bottom: 5px;">
                                <i class="bi bi-calendar me-2" style="color: var(--pastel-lavender);"></i>
                                Start: ${new Date(event.start).toLocaleString('en-GB', {
            day: '2-digit',
            month: '2-digit',
            year: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        })}
                            </p>
                            <p style="color: var(--charcoal); margin-bottom: 5px;">
                                <i class="bi bi-calendar me-2" style="color: var(--peachy-pink);"></i>
                                End: ${new Date(event.end).toLocaleString('en-GB', {
            day: '2-digit',
            month: '2-digit',
            year: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        })}
                            </p>
                            ${event.extendedProps.event_type === 'joined' ?
                `<p style="color: var(--charcoal); margin-top: 10px;">
                                    <i class="bi bi-person-fill me-2" style="color: var(--joined-red);"></i>
                                    Joined event with ${joinedUsername}
                                </p>` :
                `<p style="color: var(--charcoal); margin-top: 10px;">
                                    <i class="bi bi-person me-2" style="color: ${event.extendedProps.color_scheme === 'purple' ? '#c084fc' : '#f9a8d4'};"></i>
                                    Solo event
                                </p>`
            }
                        </div>
                        <div class="modal-footer" style="border-top: 2px solid var(--pastel-lavender);">
                            ${canEdit ? `
                                <a href="/calendar/edit/${event.id}" class="btn btn-primary">
                                    <i class="bi bi-pencil"></i> edit
                                </a>
                                <button type="button" class="btn btn-danger" onclick="confirmDelete(${event.id})">
                                    <i class="bi bi-trash"></i> delete
                                </button>
                            ` : ''}
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                close
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        const existingModal = document.getElementById('eventModal');
        if (existingModal) {
            existingModal.remove();
        }

        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = new bootstrap.Modal(document.getElementById('eventModal'));
        modal.show();

        document.getElementById('eventModal').addEventListener('hidden.bs.modal', function () {
            this.remove();
        });
    }

    // Global delete confirmation function
    window.confirmDelete = function (eventId) {
        if (confirm('Delete this event?')) {
            window.location.href = '/calendar/delete/' + eventId;
        }
    };
</script>

<style>
.header-chevron {
    display: inline-block;
    margin-right: 4px;
}

/* Calendar wrapper */
.calendar-wrapper {
    width: 100%;
    position: relative;
}

/* Calendar container */
.calendar-container {
    background: white;
    border-radius: 24px;
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
    width: 100%;
}

/* Calendar customizations */
.fc {
    background: white;
    color: var(--charcoal);
    font-family: 'Inter', sans-serif;
    border-radius: var(--border-radius-card);
    padding: 20px;
    width: 100% !important;
}

.fc-toolbar-title {
    color: var(--charcoal) !important;
    text-transform: lowercase;
    font-size: 1.5rem !important;
}

.fc-button-primary {
    background: white !important;
    border: 1px solid var(--pastel-lavender) !important;
    color: var(--charcoal) !important;
    border-radius: var(--border-radius-button) !important;
    text-transform: lowercase !important;
    box-shadow: none !important;
}

.fc-button-primary:hover {
    background: var(--pastel-lavender) !important;
    border-color: var(--soft-lavender) !important;
}

.fc-day {
    background: white !important;
}

.fc-day-today {
    background: rgba(230, 230, 250, 0.3) !important;
}

/* COMPLETELY RESET FULLCALENDAR EVENT STYLING */
.fc-event,
.fc-h-event,
.fc-v-event,
.fc-daygrid-event,
.fc-timegrid-event {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    min-height: auto !important;
}

/* Remove ALL FullCalendar default pseudo-elements */
.fc-event:before,
.fc-event:after,
.fc-event .fc-event-main:before,
.fc-event .fc-event-main:after,
.fc-event .fc-event-title:before,
.fc-event .fc-event-title:after,
.fc-event .fc-event-time:before,
.fc-event .fc-event-time:after {
    display: none !important;
    content: none !important;
}

/* Your custom event styling */
.fc-event {
    cursor: pointer;
    padding: 4px 8px !important;
    margin: 2px 4px !important;
    border-radius: 8px !important;
    font-size: 0.85rem !important;
    font-weight: 500 !important;
    transition: all 0.2s ease !important;
    display: flex !important;
    align-items: center !important;
    position: relative !important;
}

.fc-event .fc-event-main {
    display: flex !important;
    align-items: center !important;
    width: 100% !important;
    background: transparent !important;
    padding: 0 !important;
}

/* Event background colors */
.fc-event[data-type="solo"][data-color="purple"] {
    background: #e6e6fa !important;
    border-left: 3px solid #c084fc !important;
}

.fc-event[data-type="solo"][data-color="pink"] {
    background: #ffdab9 !important;
    border-left: 3px solid #f9a8d4 !important;
}

.fc-event[data-type="solo"][data-color="blue"] {
    background: #b8e2f2 !important;
    border-left: 3px solid #7aa5c7 !important;
}

.fc-event[data-type="solo"][data-color="orange"] {
    background: #ffd7b5 !important;
    border-left: 3px solid #f9a95d !important;
}

.fc-event[data-type="joined"] {
    background: #ffb6b6 !important;
    border-left: 3px solid #f87171 !important;
}

.fc-event:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important;
}

.fc-event-title {
    font-weight: 500 !important;
    color: #4a4a4a !important;
    white-space: nowrap !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
}

.fc-event-time {
    color: #4a4a4a !important;
    opacity: 0.8 !important;
    margin-right: 4px !important;
    white-space: nowrap !important;
}

.fc-day-header {
    background: rgba(230, 230, 250, 0.3) !important;
    padding: 10px 0 !important;
    font-weight: 500 !important;
    color: var(--charcoal) !important;
    text-transform: lowercase !important;
}

.fc-daygrid-day-number {
    color: var(--charcoal) !important;
}

/* Modal styling */
.modal-content {
    border: 2px solid var(--pastel-lavender);
    border-radius: 24px !important;
}

.modal-header {
    border-bottom: 2px solid var(--pastel-lavender);
    background: white;
    border-radius: 24px 24px 0 0;
}

.modal-footer {
    border-top: 2px solid var(--pastel-lavender);
    background: white;
    border-radius: 0 0 24px 24px;
}

.btn-secondary {
    background: white;
    border: 2px solid var(--warm-gray);
    color: var(--charcoal);
}

.btn-secondary:hover {
    background: var(--warm-gray);
    color: white;
}

/* Desktop optimizations */
@media (min-width: 769px) {
    .fc-toolbar {
        flex-direction: row !important;
        align-items: center !important;
    }
    
    .fc-toolbar-chunk {
        width: auto !important;
    }
    
    .fc-toolbar-title {
        font-size: 1.5rem !important;
    }
    
    .fc-button-group {
        flex-wrap: nowrap !important;
    }
}

/* Mobile optimizations - with horizontal scroll */
@media (max-width: 768px) {
    .fc-toolbar {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 10px !important;
    }
    
    .fc-toolbar-chunk {
        width: 100% !important;
    }
    
    .fc-toolbar-title {
        font-size: 1.2rem !important;
    }
    
    .fc-button-group {
        flex-wrap: wrap !important;
    }
    
    /* CRITICAL FIXES */
    .row {
        margin-right: 0;
        margin-left: 0;
    }
    
    .col-12 {
        padding-right: 0;
        padding-left: 0;
        overflow-x: visible;
    }
    
    .card {
        border-radius: 0 !important;
        overflow: visible !important;
    }
    
    .card-body {
        overflow: visible !important;
        padding: 10px 5px !important;
    }
    
    /* Make container scrollable */
    .calendar-container {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        margin: 0;
        width: 100%;
        border-radius: 0 !important;
        /* Ensure container doesn't restrict */
        max-width: 100vw;
    }
    
    /* Make calendar wider than screen */
    .fc {
        width: 720px !important; /* Increased from 700px */
        min-width: 720px !important;
        padding: 15px;
        padding-right: 15px;
        margin: 0;
        /* Prevent any width restrictions */
        max-width: none !important;
    }

    /* Ensure proper cell widths */
    .fc-daygrid-day {
        width: 100px !important;
        min-width: 100px !important;
    }

    .fc-col-header-cell {
        width: 100px !important;
        min-width: 100px !important;
    }
    
    /* Adjust event display */
    .fc-event {
        font-size: 0.7rem !important;
        padding: 2px 4px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
    }
    
    /* Style the scrollbar */
    .calendar-container::-webkit-scrollbar {
        height: 4px;
    }
    
    .calendar-container::-webkit-scrollbar-track {
        background: var(--off-white);
    }
    
    .calendar-container::-webkit-scrollbar-thumb {
        background: var(--pastel-lavender);
        border-radius: 4px;
    }
}
/* Small mobile devices */
@media (max-width: 480px) {
    .fc {
        width: 700px !important; /* Increased from 650px */
        min-width: 670px !important;
        padding-right: 25px !important;
    }
    
    .fc-daygrid-day {
        width: 90px !important;
        min-width: 90px !important;
    }
    
    .fc-col-header-cell {
        width: 90px !important;
        min-width: 90px !important;
    }
}
/* Other users' events styling */
.fc-event.other-user-event {
    opacity: 0.8;
    filter: brightness(0.95);
}

.fc-event.other-user-event:hover {
    opacity: 1;
    filter: brightness(1);
}

/* Add a subtle pattern to distinguish other users' events */
.fc-event.other-user-event[data-type="solo"] {
    background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(255, 255, 255, 0.3) 8px,
        rgba(255, 255, 255, 0.3) 16px
    ) !important;
}

/* Ensure the pattern doesn't override the background color */
.fc-event.other-user-event[data-type="solo"][data-color="purple"] {
    background: repeating-linear-gradient(
        45deg,
        #e6e6fa,
        #e6e6fa 8px,
        rgba(255, 255, 255, 0.4) 8px,
        rgba(255, 255, 255, 0.4) 16px
    ) !important;
}

.fc-event.other-user-event[data-type="solo"][data-color="pink"] {
    background: repeating-linear-gradient(
        45deg,
        #ffdab9,
        #ffdab9 8px,
        rgba(255, 255, 255, 0.4) 8px,
        rgba(255, 255, 255, 0.4) 16px
    ) !important;
}

.fc-event.other-user-event[data-type="solo"][data-color="blue"] {
    background: repeating-linear-gradient(
        45deg,
        #b8e2f2,
        #b8e2f2 8px,
        rgba(255, 255, 255, 0.4) 8px,
        rgba(255, 255, 255, 0.4) 16px
    ) !important;
}

.fc-event.other-user-event[data-type="solo"][data-color="orange"] {
    background: repeating-linear-gradient(
        45deg,
        #ffd7b5,
        #ffd7b5 8px,
        rgba(255, 255, 255, 0.4) 8px,
        rgba(255, 255, 255, 0.4) 16px
    ) !important;
}
</style>
{% endblock %}
