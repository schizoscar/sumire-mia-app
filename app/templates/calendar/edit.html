{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card auth-card">
            <div class="card-header">
                <h4 class="mb-0 glitch" data-text="> EDIT EVENT">
                    > EDIT EVENT
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('calendar.edit', event_id=event.id) }}" id="eventForm">
                    <div class="mb-3">
                        <label for="title" class="form-label">> EVENT_TITLE</label>
                        <input type="text" class="form-control" id="title" name="title" 
                               value="{{ event.title }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">> DESCRIPTION</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ event.description or '' }}</textarea>
                    </div>
                    
                    <!-- Simple Radio Button for Event Type -->
                    <div class="mb-4">
                        <label class="form-label">> EVENT_TYPE</label>
                        <div class="simple-radio-group">
                            <label class="simple-radio">
                                <input type="radio" name="event_type" value="solo" {% if event.event_type == 'solo' %}checked{% endif %}>
                                <span>solo event</span>
                            </label>
                            <label class="simple-radio">
                                <input type="radio" name="event_type" value="joined" {% if event.event_type == 'joined' %}checked{% endif %}>
                                <span>joined event</span>
                            </label>
                        </div>
                    </div>

                    <!-- User Selector for Joined Events -->
                    <div class="user-selector mb-4" id="userSelector" {% if event.event_type != 'joined' %}style="display: none;"{% endif %}>
                        <label for="joined_user" class="form-label">> JOIN WITH</label>
                        <select class="form-control" id="joined_user" name="joined_user_id">
                            <option value="">select a user...</option>
                            {% for user in users %}
                                {% if user.id != current_user.id %}
                                <option value="{{ user.id }}" {% if event.joined_user_id == user.id %}selected{% endif %}>
                                    {{ user.username }}
                                </option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="start_date" class="form-label">> START_DATE (DD/MM/YYYY)</label>
                        <input type="text" class="form-control datepicker-input" id="start_date" 
                               placeholder="DD/MM/YYYY" 
                               value="{{ event.start_date.strftime('%d/%m/%Y') if event.start_date else '' }}" 
                               required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="start_time" class="form-label">> START_TIME (HH:MM)</label>
                        <input type="time" class="form-control" id="start_time" name="start_time" 
                               value="{{ event.start_date.strftime('%H:%M') if event.start_date else '12:00' }}" 
                               step="60" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="end_date" class="form-label">> END_DATE (DD/MM/YYYY)</label>
                        <input type="text" class="form-control datepicker-input" id="end_date" 
                               placeholder="DD/MM/YYYY" 
                               value="{{ event.end_date.strftime('%d/%m/%Y') if event.end_date else '' }}" 
                               required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="end_time" class="form-label">> END_TIME (HH:MM)</label>
                        <input type="time" class="form-control" id="end_time" name="end_time" 
                               value="{{ event.end_date.strftime('%H:%M') if event.end_date else '13:00' }}" 
                               step="60" required>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            > UPDATE_EVENT
                        </button>
                        <a href="{{ url_for('calendar.index') }}" class="btn btn-danger">
                            > CANCEL
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript for datetime handling -->
<script>
    $(document).ready(function () {
        // Initialize datepickers
        $('.datepicker-input').datepicker({
            format: 'dd/mm/yyyy',
            autoclose: true,
            todayHighlight: true,
            orientation: 'bottom auto'
        });

        // Toggle user selector based on event type
        $('input[name="event_type"]').on('change', function () {
            if ($(this).val() === 'joined') {
                $('#userSelector').slideDown(200);
            } else {
                $('#userSelector').slideUp(200);
            }
        });
    });
</script>

<style>
/* Datepicker customization */
.datepicker {
    background: var(--darker-bg) !important;
    border: 2px solid var(--neon-purple) !important;
    border-radius: 0 !important;
    font-family: 'Share Tech Mono', monospace;
    z-index: 9999 !important;
}

.datepicker table {
    background: var(--darker-bg);
    width: 100%;
}

.datepicker td, .datepicker th {
    color: var(--text-primary) !important;
    border-radius: 0 !important;
    padding: 8px !important;
}

.datepicker td.active, .datepicker td.active:hover {
    background: var(--neon-purple) !important;
    color: var(--dark-bg) !important;
    text-shadow: none !important;
}

.datepicker td:hover {
    background: rgba(184, 41, 255, 0.3) !important;
}

.datepicker .datepicker-switch:hover, 
.datepicker .prev:hover, 
.datepicker .next:hover {
    background: var(--neon-pink) !important;
}

/* Simple Radio Button Styles */
.simple-radio-group {
    display: flex;
    gap: 20px;
    margin-top: 5px;
}

.simple-radio {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--charcoal);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
}

.simple-radio input[type="radio"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--sage-green); /* Pastel green for selected state */
}

.simple-radio input[type="radio"]:checked {
    background-color: var(--sage-green);
    border-color: var(--sage-green);
}

/* Time input styling */
input[type="time"].form-control {
    color-scheme: light;
    background: white !important;
    border: 2px solid var(--pastel-pink) !important;
    color: var(--charcoal) !important;
    padding: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
}

input[type="time"].form-control:focus {
    border-color: var(--pastel-pink) !important;
    box-shadow: 0 0 0 3px rgba(255, 209, 220, 0.3) !important;
    outline: none;
}

input[type="time"].form-control::-webkit-calendar-picker-indicator {
    filter: none;
    opacity: 0.6;
    cursor: pointer;
    padding: 5px;
}

input[type="time"].form-control::-webkit-calendar-picker-indicator:hover {
    opacity: 1;
}

/* Time input dropdown/clock styling */
input[type="time"]::-webkit-datetime-edit-fields-wrapper {
    color: var(--charcoal);
}

input[type="time"]::-webkit-datetime-edit-text {
    color: var(--pastel-pink);
    font-weight: bold;
}

input[type="time"]::-webkit-datetime-edit-hour-field,
input[type="time"]::-webkit-datetime-edit-minute-field {
    color: var(--charcoal);
    background: transparent;
}

input[type="time"]::-webkit-datetime-edit-hour-field:focus,
input[type="time"]::-webkit-datetime-edit-minute-field:focus {
    background-color: var(--pastel-pink);
    color: var(--charcoal);
    outline: none;
}

/* Datepicker customization */
.datepicker {
    background: white !important;
    border: 2px solid var(--pastel-lavender) !important;
    border-radius: 12px !important;
    font-family: 'Inter', sans-serif;
    box-shadow: var(--shadow-soft);
}

.datepicker table {
    background: white;
    width: 100%;
    border-radius: 12px;
}

.datepicker td, .datepicker th {
    color: var(--charcoal) !important;
    border-radius: 8px !important;
    padding: 8px !important;
}

.datepicker td.active, .datepicker td.active:hover {
    background: var(--sage-green) !important;
    color: var(--charcoal) !important;
    font-weight: 500;
}

.datepicker td:hover {
    background: var(--pastel-lavender) !important;
}

.datepicker .datepicker-switch:hover, 
.datepicker .prev:hover, 
.datepicker .next:hover {
    background: var(--pastel-pink) !important;
    color: var(--charcoal) !important;
}

/* Form control styling for date inputs */
.form-control, .form-control:focus {
    background: white !important;
    border: 2px solid var(--pastel-lavender) !important;
    color: var(--charcoal) !important;
    font-family: 'Inter', sans-serif;
    padding: 12px;
    border-radius: 8px;
}

.form-control:focus {
    border-color: var(--pastel-pink) !important;
    box-shadow: 0 0 0 3px rgba(255, 209, 220, 0.3) !important;
}

.form-control::placeholder {
    color: var(--warm-gray) !important;
    opacity: 0.7;
}

/* User selector */
.user-selector select {
    background: white !important;
    color: var(--charcoal) !important;
    border: 2px solid var(--pastel-lavender) !important;
    padding: 12px;
    font-family: 'Inter', sans-serif;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
}

.user-selector select:focus {
    border-color: var(--pastel-pink) !important;
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 209, 220, 0.3);
}

.user-selector select option {
    background: white;
    padding: 10px;
    color: var(--charcoal);
}

/* Button styling */
.btn {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    border-radius: 12px !important;
    padding: 12px 24px;
    transition: all 0.2s ease;
    text-transform: lowercase;
    letter-spacing: 0.3px;
}

.btn-primary {
    background: white !important;
    border: 2px solid var(--pastel-lavender) !important;
    color: var(--charcoal) !important;
}

.btn-primary:hover {
    background: var(--pastel-lavender) !important;
    border-color: var(--soft-lavender) !important;
    color: var(--charcoal) !important;
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}

.btn-danger {
    background: white !important;
    border: 2px solid #f8d7da !important;
    color: #842029 !important;
}

.btn-danger:hover {
    background: #f8d7da !important;
    border-color: #f5c2c7 !important;
    color: #842029 !important;
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}

/* Card styling */
.auth-card {
    border: 2px solid var(--pastel-lavender);
    border-radius: 24px !important;
    box-shadow: var(--shadow-soft);
}

.card-header {
    background: rgba(230, 230, 250, 0.2) !important;
    border-bottom: 2px solid var(--pastel-lavender) !important;
    padding: 1.2rem 1.5rem;
}

.card-header h4 {
    color: var(--charcoal);
    font-size: 1.3rem;
    font-weight: 500;
}

.card-body {
    padding: 2rem;
}

/* Labels */
.form-label {
    color: var(--charcoal);
    font-weight: 500;
    margin-bottom: 8px;
    font-size: 0.9rem;
    text-transform: lowercase;
    letter-spacing: 0.3px;
}

/* Mobile responsiveness */
@media (max-width: 768px) {
    .simple-radio-group {
        flex-direction: column;
        gap: 10px;
    }
    
    .btn {
        width: 100%;
        margin-bottom: 10px;
    }
    
    .d-flex.gap-2 {
        flex-direction: column;
    }
    
    .card-body {
        padding: 1.5rem;
    }
}
</style>
{% endblock %}
