{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card auth-card">
            <div class="card-header">
                <h4 class="mb-0 glitch" data-text="> ADD NEW USER">
                    > ADD NEW USER
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.add_user') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">> USERNAME</label>
                        <input type="text" class="form-control" id="username" name="username" required
                        <small class="form-text user-hint">Choose a unique username (3-20 characters)</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">> EMAIL</label>
                        <input type="email" class="form-control" id="email" name="email" required
                        <small class="form-text user-hint">Valid email required for invitations</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="color_scheme" class="form-label">> COLOR SCHEME</label>
                        <select class="form-control" id="color_scheme" name="color_scheme" 
                                style="color: var(--neon-green) !important; background: rgba(10,10,15,0.9);">
                            <option value="purple" style="color: var(--neon-purple);">💜 PURPLE</option>
                            <option value="pink" style="color: var(--neon-pink);">🩷 PINK</option>
                        </select>
                        <small class="form-text user-hint">Determines the user's theme color</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="role" class="form-label">> USER ROLE</label>
                        <select class="form-control" id="role" name="is_admin" 
                                style="color: var(--neon-green) !important; background: rgba(10,10,15,0.9);">
                            <option value="0" style="color: var(--neon-blue);">👤 USER</option>
                            <option value="1" style="color: var(--neon-purple);">⚡ ADMIN</option>
                        </select>
                        <small class="form-text user-hint">Admins have full system access</small>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="send_invite" name="send_invite" checked>
                        <label class="form-check-label" for="send_invite">SEND INVITATION EMAIL</label>
                    </div>
                    
                    <div class="alert alert-info" style="background: rgba(10,10,15,0.9); border-left-color: var(--neon-blue);">
                        <i class="bi bi-info-circle-fill me-2" style="color: var(--neon-blue);"></i>
                        <span style="color: var(--neon-green);">A temporary password will be generated automatically</span>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="bi bi-person-plus"></i> CREATE USER
                        </button>
                        <a href="{{ url_for('admin.users') }}" class="btn btn-danger">
                            <i class="bi bi-x-circle"></i> CANCEL
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
/* Form styling */
.form-control {
    border: 1px solid var(--neon-purple);
    border-radius: 0;
    padding: 12px;
}

.form-control:focus {
    border-color: var(--neon-pink);
    box-shadow: 0 0 15px rgba(255, 42, 109, 0.3);
}

/* Brighter hint text */
.user-hint {
    color: var(--neon-blue) !important;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    margin-top: 8px;
    display: block;
    opacity: 1;
    text-shadow: 0 0 8px var(--neon-blue);
    letter-spacing: 0.5px;
    border-left: 2px solid var(--neon-blue);
    padding-left: 8px;
}

/* Form check styling */
.form-check-input {
    background-color: transparent;
    border-color: var(--neon-purple);
    cursor: pointer;
    width: 18px;
    height: 18px;
}

.form-check-input:checked {
    background-color: var(--neon-purple);
    border-color: var(--neon-purple);
}

.form-check-label {
    color: var(--neon-green);
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    margin-left: 8px;
    font-size: 0.9rem;
}

/* Alert styling */
.alert {
    border-radius: 0;
    border: 1px solid var(--neon-blue);
    color: var(--text-primary);
    font-family: 'Share Tech Mono', monospace;
    padding: 15px;
}

.alert i {
    color: var(--neon-blue);
    font-size: 1.1rem;
}

/* Select options styling */
select option {
    background: var(--darker-bg);
    padding: 10px;
}

/* Responsive */
@media (max-width: 768px) {
    .d-flex.gap-2 {
        flex-direction: column;
    }
    
    .btn {
        width: 100%;
    }
    
    .user-hint {
        font-size: 0.75rem;
    }
}
</style>
{% endblock %}
